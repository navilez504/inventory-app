version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: inventory_postgres
    restart: always
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: inventory_backend
    depends_on:
      - postgres
    environment:
      APP_NAME: "Inventory Management System"
      DATABASE_URL: postgresql://inventory_user:password@postgres:5432/inventory_db
      JWT_SECRET_KEY: super-strong-fixed-secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ALLOW_ORIGINS: "http://localhost:5173,http://localhost"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  # Static UI baked at image build time. After changing React code run:
  #   docker compose build frontend --no-cache && docker compose up -d frontend nginx
  # Or use live UI at http://localhost:5174 — docker compose --profile dev-ui up -d
  frontend:
    build: ./frontend
    container_name: inventory_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  frontend-dev:
    profiles: ["dev-ui"]
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dev_node_modules:/app/node_modules
    environment:
      VITE_API_TARGET: http://backend:8000
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5174:5173"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: inventory_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  frontend_dev_node_modules: