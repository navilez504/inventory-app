version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: inventory_postgres
    restart: always
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: inventory_backend
    depends_on:
      - postgres
    environment:
      APP_NAME: "Inventory Management System"
      DATABASE_URL: postgresql://inventory_user:password@postgres:5432/inventory_db
      JWT_SECRET_KEY: super-strong-fixed-secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ALLOW_ORIGINS: "http://localhost:5173,http://localhost"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: inventory_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  nginx:
    image: nginx:latest
    container_name: inventory_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data: